<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <!-- Optimized viewport for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Dark Mode Mobile Chat</title>
    <style>
        :root {
            /* Dark mode color palette */
            --primary-color: #f6821f;       /* Orange (accent) */
            --primary-hover: #e67e22;       /* Darker orange */
            --bg-dark: #121212;             /* Main background (near-black) */
            --bg-darker: #0a0a0a;           /* Deeper background */
            --border-color: #333333;         /* Subtle borders */
            --text-primary: #f3f4f6;        /* Light text (main) */
            --text-secondary: #9ca3af;      /* Muted text (secondary) */
            --user-msg-bg: #332b1a;          /* User message (dark orange tint) */
            --assistant-msg-bg: #1f2937;     /* Assistant message (dark blue-gray) */
            --input-bg: #1e1e1e;             /* Input field background */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background-color: var(--bg-dark);
            max-width: 100%; /* Full width on mobile */
            margin: 0 auto;
            padding: 0.5rem; /* Reduced padding for small screens */
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 1.25rem; /* Smaller heading for mobile */
            color: var(--primary-color);
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 180px); /* Dynamic height for mobile */
            min-height: 350px; /* Minimum height to avoid squishing */
            border: 1px solid var(--border-color);
            border-radius: 12px; /* Softer corners */
            overflow: hidden;
            background-color: var(--bg-darker); /* Inner container background */
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background-color: var(--bg-dark);
            scrollbar-width: thin; /* Slim scrollbar for mobile */
            scrollbar-color: var(--primary-color) transparent;
        }

        /* Custom scrollbar for WebKit browsers */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background-color: var(--primary-color);
            border-radius: 3px;
        }

        .message {
            margin-bottom: 1rem;
            padding: 0.75rem 1rem; /* More horizontal padding */
            border-radius: 12px; /* Rounded bubbles */
            max-width: 90%; /* Wider messages on mobile */
            word-wrap: break-word; /* Prevent overflow */
        }

        .message p {
            margin: 0;
            white-space: pre-line; /* Preserve line breaks */
        }

        .user-message {
            background-color: var(--user-msg-bg);
            align-self: flex-end;
            margin-left: auto;
            color: #fff; /* White text for contrast */
        }

        .assistant-message {
            background-color: var(--assistant-msg-bg);
            align-self: flex-start;
            color: var(--text-primary);
        }

        .message-input {
            display: flex;
            gap: 0.5rem; /* Space between input and button */
            padding: 0.75rem;
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-darker);
            align-items: center; /* Vertical alignment */
        }

        #user-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            background-color: var(--input-bg);
            color: var(--text-primary);
            resize: none;
            min-height: 44px; /* Touch-friendly minimum */
            max-height: 120px; /* Limit growth */
            overflow-y: auto;
        }

        #user-input:focus {
            outline: 2px solid var(--primary-color); /* Focus indicator */
            outline-offset: 2px;
        }

        #send-button {
            padding: 0.75rem 1.5rem; /* Larger tap target */
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: background-color 0.2s;
            min-width: 80px; /* Consistent width */
        }

        #send-button:hover {
            background-color: var(--primary-hover);
        }

        #send-button:disabled {
            background-color: var(--text-secondary);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .typing-indicator {
            display: none;
            font-style: italic;
            color: var(--text-secondary);
            padding: 0 1rem 1rem;
            font-size: 0.9rem;
        }

        .typing-indicator.visible {
            display: block;
        }

        footer {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Mobile-specific adjustments (under 768px) */
        @media (max-width: 768px) {
            body {
                padding: 0.25rem; /* Minimal padding */
            }

            h1 {
                font-size: 1.1rem; /* Even smaller heading */
            }

            .chat-container {
                height: calc(100vh - 160px); /* Adjust for mobile status bars */
                min-height: 300px;
            }

            .message {
                max-width: 95%; /* Nearly full width */
                padding: 0.6rem 0.8rem; /* Tighter padding */
            }

            #user-input {
                padding: 0.6rem 0.8rem;
                font-size: 0.95rem;
            }

            #send-button {
                padding: 0.6rem 1.2rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Dark Mode Mobile Chat</h1>
        <p>Powered by Cloudflare Workers AI</p>
    </header>

    <div class="chat-container">
        <div id="chat-messages" class="chat-messages">
            <div class="message assistant-message">
                <p>Hello! I'm a mobile-friendly dark mode chat app. How can I help you?</p>
            </div>
        </div>

        <div class="typing-indicator" id="typing-indicator">
            AI is thinking...
        </div>

        <div class="message-input">
            <textarea
                id="user-input"
                placeholder="Type your message..."
                rows="1"
                autocomplete="off"
            ></textarea>
            <button id="send-button">Send</button>
        </div>
    </div>

    <footer>
        <p>Dark Mode Chat Template &copy; 2025</p>
    </footer>

    <!-- Chat functionality (unchanged, but optimized for mobile) -->
    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const typingIndicator = document.getElementById('typing-indicator');

        // Auto-resize textarea
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
        });

        // Send message on Enter (without Shift)
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendButton.addEventListener('click', sendMessage);

        function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Add user message
            addMessage(message, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';

            // Show typing indicator
            typingIndicator.classList.add('visible');

            // Simulate AI response (replace with actual API call)
            setTimeout(() => {
                typingIndicator.classList.remove('visible');
                addMessage(`You said: "${message}". This is a sample response.`, 'assistant');
            }, 1500);
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            messageDiv.innerHTML = `<p>${text}</p>`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight; // Auto-scroll to bottom
        }
    </script>
</body>
</html>
